<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>The Remembering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="game.js"></script>
  <style>
    #intro {
      position: fixed; top: 8vh; left: 0; right: 0;
      text-align: center; color: #cfe0d4;
      font-family: Georgia, 'Times New Roman', serif;
      pointer-events: none; z-index: 999;
      text-shadow: 0 0 14px #000, 0 0 4px #000;
    }
    #intro h1 { font-size: 2.1em; font-weight: normal; letter-spacing: 0.35em; margin: 0 0 0.4em; }
    #intro p  { font-size: 1.05em; opacity: 0.75; font-style: italic; margin: 0.2em 0; }
  </style>
</head>
<body>
  <div id="intro">
    <h1>THE REMEMBERING</h1>
    <p>a quiet game about who you are</p>
    <p>it will not tell you what to do &mdash; your hands already know</p>
  </div>

  <a-scene soul-game
           fog="type: exponential; color: #0a0e18; density: 0.045"
           renderer="colorManagement: true; antialias: true; foveationLevel: 1">

    <a-sky id="sky" color="#0a0e18" radius="90"></a-sky>
    <a-circle id="ground" rotation="-90 0 0" radius="60" color="#0f1a15"
              material="roughness: 1; metalness: 0"></a-circle>

    <a-entity light="type: hemisphere; color: #33415a; groundColor: #16211b; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; color: #8899bb; intensity: 0.25" position="-3 8 2"></a-entity>

    <!-- standing stones: quiet landmarks, nothing more -->
    <a-cone position="6.5 0 -7"   rotation="0 20 4"   radius-bottom="0.7"  radius-top="0.12" height="2.6" color="#1b2833" material="roughness: 1"></a-cone>
    <a-cone position="-8 0 -4"    rotation="0 -35 -3" radius-bottom="0.9"  radius-top="0.2"  height="3.4" color="#182430" material="roughness: 1"></a-cone>
    <a-cone position="-5 0 8"     rotation="0 60 2"   radius-bottom="0.55" radius-top="0.1"  height="2.1" color="#1d2b36" material="roughness: 1"></a-cone>
    <a-cone position="9 0 5"      rotation="0 -10 -5" radius-bottom="0.8"  radius-top="0.15" height="2.9" color="#192531" material="roughness: 1"></a-cone>
    <a-cone position="1.5 0 -12"  rotation="0 45 3"   radius-bottom="1.1"  radius-top="0.25" height="4.2" color="#16222d" material="roughness: 1"></a-cone>

    <a-entity id="rig">
      <a-entity id="head" camera position="0 1.6 0" look-controls wasd-controls="acceleration: 18">
        <a-text id="msg" value="" align="center" baseline="center"
                position="0 -0.22 -1.5" width="2.6" color="#d9ecd9"
                opacity="0" side="double"></a-text>
      </a-entity>
      <a-entity id="handL" meta-touch-controls="hand: left"></a-entity>
      <a-entity id="handR" meta-touch-controls="hand: right"></a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
